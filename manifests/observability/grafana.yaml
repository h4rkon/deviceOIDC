apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        access: proxy
        url: http://mimir.observability.svc.cluster.local:9009/prometheus
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: false
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        isDefault: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "dataplatform"
        orgId: 1
        folder: "Data Platform"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-dataplatform
  namespace: observability
data:
  dataplatform-cdc.json: |
    {
      "uid": "dataplatform-cdc",
      "title": "Data Platform CDC",
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Debezium Offset Commits (per min)",
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count_over_time({namespace=\"kafka\", app=\"connect\"} |= \"WorkerSourceTask\" [1m])"
            }
          ],
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Debezium Errors (per min)",
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count_over_time({namespace=\"kafka\", app=\"connect\"} |= \"ERROR\" [1m])"
            }
          ],
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Iceberg Sink Commits (per min)",
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count_over_time({namespace=\"kafka\", app=\"iceberg-connect\"} |= \"Successfully committed to table\" [1m])"
            }
          ],
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Iceberg Sink Errors (per min)",
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count_over_time({namespace=\"kafka\", app=\"iceberg-connect\"} |= \"ERROR\" [1m])"
            }
          ],
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 }
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: observability
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
          volumeMounts:
            - name: ds
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-data
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: ds
          configMap:
            name: grafana-datasources
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards-data
          configMap:
            name: grafana-dashboard-dataplatform
            items:
              - key: dataplatform-cdc.json
                path: dataplatform-cdc.json
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
